name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build, vet, and test
        run: |
          go build ./...
          go vet ./...
          go test -race -count=1 ./...

      - name: Lint
        if: success() || failure()
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
